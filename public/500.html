<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Facebook Share Booster</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231877f2'%3E%3Cpath d='M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .error-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 60px 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .error-icon {
            font-size: 80px;
            color: #ffd89b;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        .error-title {
            font-size: 28px;
            color: #fff;
            margin-bottom: 16px;
        }
        .error-message {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .error-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .error-btn-primary:hover, .error-btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .info-box {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        .info-box p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 12px;
        }
        .info-status {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd89b;
        }
        .retry-countdown {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-server"></i>
            </div>
            <div class="error-code">500</div>
            <h1 class="error-title">Internal Server Error</h1>
            <p class="error-message">Something went wrong on our end. Our team has been notified. Please try again later.</p>
            <div class="error-actions">
                <a href="/" class="error-btn error-btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <button onclick="retryConnection()" class="error-btn error-btn-secondary" id="retryBtn">
                    <i class="fas fa-sync-alt"></i> Retry Now
                </button>
            </div>
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> Server Status:</p>
                <div class="info-status" id="serverStatus">
                    <i class="fas fa-circle-notch fa-spin"></i> Checking...
                </div>
                <div class="retry-countdown" id="countdown"></div>
            </div>
        </div>
    </div>

    <script>
        let countdown = 5;
        const countdownEl = document.getElementById('countdown');
        const statusEl = document.getElementById('serverStatus');
        
        function checkServerStatus() {
            fetch('/api/health')
                .then(response => {
                    if (response.ok) {
                        statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Server is recovering - Redirecting...';
                        statusEl.style.color = '#4caf50';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);
                    } else {
                        statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Server still unavailable';
                        statusEl.style.color = '#ff6b6b';
                        startCountdown();
                    }
                })
                .catch(() => {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Server still unavailable';
                    statusEl.style.color = '#ff6b6b';
                    startCountdown();
                });
        }
        
        function startCountdown() {
            countdown = 5;
            countdownEl.style.display = 'block';
            const interval = setInterval(() => {
                countdown--;
                countdownEl.innerHTML = `Auto retry in ${countdown} seconds...`;
                if (countdown <= 0) {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    checkServerStatus();
                }
            }, 1000);
        }
        
        function retryConnection() {
            const btn = document.getElementById('retryBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            fetch('/api/health')
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Retry Now';
                        statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Server still unavailable';
                        startCountdown();
                    }
                })
                .catch(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> Retry Now';
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Server still unavailable';
                    startCountdown();
                });
        }
        
        startCountdown();
    </script>
</body>
</html>
