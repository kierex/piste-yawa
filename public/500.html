<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: rgba(12, 12, 28, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 100px; background: linear-gradient(135deg, #ff4757, #ff6b81); -webkit-background-clip: text; background-clip: text; color: transparent; }
        p { color: #ccc5ff; margin: 20px 0; font-size: 18px; }
        .btn { display: inline-block; background: linear-gradient(100deg, #7248ff, #c55aff); padding: 12px 32px; border-radius: 40px; color: white; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
<div class="error-card">
    <h1>500</h1>
    <i class="fas fa-database" style="font-size: 64px; color: #ff6b6b;"></i>
    <p>Internal server error. Our quantum engines are recalibrating.</p>
    <a href="/" class="btn"><i class="fas fa-sync-alt"></i> Try Again</a>
</div>
</body>
</html>
