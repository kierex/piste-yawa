<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Share Booster - Automated Post Sharing</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231877f2'%3E%3Cpath d='M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-container {
            max-width: 500px;
            width: 90%;
            background: rgba(30, 30, 45, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }
        
        .modal-header {
            padding: 24px 24px 16px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header h2 {
            color: #fff;
            font-size: 26px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
        }
        
        .modal-header h2 i {
            color: #ffd89b;
        }
        
        .modal-body {
            padding: 24px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .greeting-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 20px;
        }
        
        .privacy-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        
        .privacy-box h3 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .privacy-box p {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.75);
        }
        
        .privacy-box ul {
            padding-left: 20px;
            margin: 12px 0;
        }
        
        .privacy-box li {
            font-size: 12px;
            margin: 6px 0;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .agree-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            padding: 12px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .agree-checkbox:hover {
            background: rgba(102, 126, 234, 0.25);
        }
        
        .agree-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .agree-checkbox label {
            cursor: pointer;
            font-weight: 500;
            color: #fff;
        }
        
        .modal-footer {
            padding: 16px 24px 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .modal-btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 14px;
        }
        
        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .modal-btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .modal-btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .error-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.4s ease;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        
        .error-icon {
            font-size: 80px;
            color: #ffd89b;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .error-message {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .error-btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .error-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .error-btn-primary:hover, .error-btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }
        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .wrapper-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .claymorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        .container, .form-wrapper { padding: 32px; margin-bottom: 24px; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
        .logo-icon { font-size: 48px; color: #1877f2; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        h1 { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #fff, #e0e0e0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h1 span { font-weight: 300; background: linear-gradient(135deg, #ffd89b, #c7e9fb); -webkit-background-clip: text; background-clip: text; }
        .tagline { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 24px; }
        .badge-container { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .badge { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; color: #fff; display: inline-flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 500; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.95); border: none; border-radius: 12px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .result-message { margin-top: 16px; padding: 12px; border-radius: 12px; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { padding: 24px; display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 32px; }
        .stat-icon { font-size: 36px; color: #fff; }
        .stat-info h3 { font-size: 28px; color: #fff; }
        .process-card { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .section-header { display: flex; justify-content: space-between; color: white; margin-bottom: 20px; }
        .session-count { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }
        .process-url { color: #fff; font-size: 14px; margin-bottom: 8px; }
        .stat-badge { background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #fff; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .github-link { display: inline-flex; gap: 8px; background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 12px; color: #fff; text-decoration: none; }
        .about-content { text-align: center; }
        .about-icon { font-size: 48px; color: #fff; margin-bottom: 16px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } h1 { font-size: 32px; } }
    </style>
</head>
<body>
<div id="app-root"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const errorType = urlParams.get('error');
    
    if (errorType === '404' || errorType === '500' || window.location.pathname.includes('404') || window.location.pathname.includes('500')) {
        let code = errorType === '404' ? '404' : '500';
        if (window.location.pathname.includes('404')) code = '404';
        if (window.location.pathname.includes('500')) code = '500';
        
        const errorMessages = {
            404: { title: 'Page Not Found', message: "The page you're looking for doesn't exist or has been moved. Let's get you back on track.", icon: 'fa-face-frown' },
            500: { title: 'Server Error', message: 'Something went wrong on our end. Our team has been notified. Please try again later.', icon: 'fa-server' }
        };
        const err = errorMessages[code] || errorMessages[500];
        
        document.body.innerHTML = `
            <div class="background-gradient"></div>
            <div class="error-container">
                <div class="error-card">
                    <div class="error-icon"><i class="fas ${err.icon}"></i></div>
                    <div class="error-code">${code}</div>
                    <h1 class="error-title">${err.title}</h1>
                    <p class="error-message">${err.message}</p>
                    <div class="error-actions">
                        <a href="/" class="error-btn error-btn-primary"><i class="fas fa-home"></i> Back to Home</a>
                        <button onclick="location.reload()" class="error-btn error-btn-secondary"><i class="fas fa-sync-alt"></i> Try Again</button>
                    </div>
                </div>
            </div>
        `;
        document.body.style.padding = '0';
        document.body.style.display = 'flex';
        document.body.style.alignItems = 'center';
        document.body.style.justifyContent = 'center';
    } else {
        renderMainApp();
    }
    
    function renderMainApp() {
        const appHtml = `
            <div class="background-gradient"></div>
            <div class="wrapper-container">
                <div class="container claymorphism">
                    <div class="logo-container">
                        <i class="fab fa-facebook logo-icon"></i>
                        <h1>FACEBOOK<span>SHARE BOOSTER</span></h1>
                    </div>
                    <p class="tagline">Automated Facebook post sharing — Boost engagement instantly</p>
                    <div class="badge-container">
                        <span class="badge"><i class="fas fa-bolt"></i> Fast Processing</span>
                        <span class="badge"><i class="fas fa-shield-alt"></i> Secure</span>
                        <span class="badge"><i class="fas fa-chart-line"></i> Real-time Stats</span>
                    </div>
                </div>

                <div class="form-wrapper claymorphism">
                    <h2><i class="fas fa-rocket"></i> Start Boosting</h2>
                    <p class="form-description" style="color:rgba(255,255,255,0.7);margin-bottom:24px;">Enter your credentials and target details</p>
                    <form onsubmit="submitForm(event)" class="form-container">
                        <div class="form-group">
                            <label><i class="fas fa-key"></i> AppState / Cookies</label>
                            <textarea id="cookies" rows="3" placeholder='[{"key":"sb","value":"xxx"},{"key":"datr","value":"xxx"}]'></textarea>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-link"></i> Post URL</label>
                            <input type="text" id="urls" placeholder="https://www.facebook.com/...">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-chart-simple"></i> Share Limit</label>
                                <input type="number" id="amounts" min="1" max="10000" value="100">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-clock"></i> Delay (seconds)</label>
                                <input type="number" id="intervals" min="1" max="60" value="2">
                            </div>
                        </div>
                        <button type="submit" id="submit-button" class="submit-btn">
                            <i class="fas fa-play"></i><span>Start Sharing</span>
                        </button>
                        <div id="result" class="result-message"></div>
                    </form>
                </div>

                <div class="container claymorphism" id="process-container" style="display: none;">
                    <div class="section-header">
                        <h2 style="font-size:24px;display:flex;align-items:center;gap:12px;"><i class="fas fa-tasks"></i> Active Sessions</h2>
                        <span class="session-count" id="session-count">0</span>
                    </div>
                    <div id="processing" class="processing-list"></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-chart-line stat-icon"></i><div class="stat-info"><h3 id="total-shares">0</h3><p>Total Shares</p></div></div>
                    <div class="stat-card"><i class="fas fa-users stat-icon"></i><div class="stat-info"><h3 id="active-sessions">0</h3><p>Active Sessions</p></div></div>
                    <div class="stat-card"><i class="fas fa-check-circle stat-icon"></i><div class="stat-info"><h3 id="completed-sessions">0</h3><p>Completed</p></div></div>
                </div>

                <div class="container claymorphism">
                    <div class="about-content">
                        <i class="fas fa-code-branch about-icon"></i>
                        <h3 style="color:#fff">Open Source Project</h3>
                        <p style="color:rgba(255,255,255,0.8);margin-bottom:20px;">Facebook Share Booster is an automated sharing tool. Contribute on GitHub.</p>
                        <a href="#" id="github-link" class="github-link"><i class="fab fa-github"></i> View on GitHub</a>
                    </div>
                </div>
            </div>
            <div id="privacyModal" class="modal-overlay">
                <div class="modal-container">
                    <div class="modal-header"><h2><i class="fas fa-hand-peace"></i> Welcome to Facebook Share Booster!</h2></div>
                    <div class="modal-body">
                        <div class="greeting-text"><i class="fas fa-smile-wink" style="font-size:24px"></i><span>Hello! 👋 Thank you for choosing our tool.</span></div>
                        <div class="privacy-box">
                            <h3><i class="fas fa-shield-heart"></i> Privacy Policy Agreement</h3>
                            <p>By using Facebook Share Booster, you acknowledge:</p>
                            <ul>
                                <li><i class="fas fa-check-circle"></i> We do NOT store any cookies or personal data.</li>
                                <li><i class="fas fa-check-circle"></i> All actions are performed from your browser session.</li>
                                <li><i class="fas fa-check-circle"></i> You comply with Facebook's Terms of Service.</li>
                                <li><i class="fas fa-check-circle"></i> Tool for educational & automation purposes.</li>
                            </ul>
                        </div>
                        <div class="agree-checkbox" id="agreeCheckboxWrapper">
                            <input type="checkbox" id="agreeCheckbox"><label for="agreeCheckbox">I have read and agree to the Privacy Policy</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="modal-btn modal-btn-secondary" id="declineBtn">Decline</button>
                        <button class="modal-btn modal-btn-primary" id="acceptBtn" disabled>Continue</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('app-root').innerHTML = appHtml;
        
        let modalAccepted = false;
        const modal = document.getElementById('privacyModal');
        const agreeCheckbox = document.getElementById('agreeCheckbox');
        const acceptBtn = document.getElementById('acceptBtn');
        const declineBtn = document.getElementById('declineBtn');
        
        function enableAccept() { acceptBtn.disabled = !agreeCheckbox.checked; }
        agreeCheckbox?.addEventListener('change', enableAccept);
        
        function closeModalAndStart() {
            if (!agreeCheckbox.checked) {
                showResultMsg('Please accept the Privacy Policy to continue.', 'error');
                return;
            }
            modalAccepted = true;
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            initApp();
        }
        
        function declineAndReload() {
            alert('You must accept the Privacy Policy to use Facebook Share Booster.');
            window.location.href = '/';
        }
        
        acceptBtn?.addEventListener('click', closeModalAndStart);
        declineBtn?.addEventListener('click', declineAndReload);
        
        window.showResultMsg = function(msg, type) {
            const resDiv = document.getElementById('result');
            if(resDiv) {
                resDiv.textContent = msg;
                resDiv.className = `result-message ${type}`;
                resDiv.style.display = 'block';
                setTimeout(() => { resDiv.style.display = 'none'; }, 4000);
            } else { alert(msg); }
        };
        
        let refreshInterval = null;
        
        async function submitForm(event) {
            event.preventDefault();
            if (!modalAccepted) { showResultMsg('Please accept Privacy Policy first', 'error'); return; }
            const cookies = document.getElementById('cookies').value;
            const url = document.getElementById('urls').value;
            const amount = document.getElementById('amounts').value;
            const interval = document.getElementById('intervals').value;
            if (!cookies || !url) { showResultMsg('Fill all fields', 'error'); return; }
            const btn = document.getElementById('submit-button');
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie: cookies, url, amount: parseInt(amount), interval: parseInt(interval) })
                });
                if (response.status === 404) throw new Error('API endpoint not found (404)');
                if (response.status === 500) throw new Error('Server error (500)');
                const data = await response.json();
                if (data.success) {
                    showResultMsg('✓ Session started!', 'success');
                    document.getElementById('cookies').value = '';
                    document.getElementById('urls').value = '';
                    loadProcessing();
                } else {
                    showResultMsg('Error: ' + (data.error || 'Unknown'), 'error');
                }
            } catch(e) {
                console.error(e);
                if(e.message.includes('404')) window.location.href = '/?error=404';
                else if(e.message.includes('500')) window.location.href = '/?error=500';
                else showResultMsg(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i><span>Start Sharing</span>';
            }
        }
        
        async function loadProcessing() {
            if (!modalAccepted) return;
            try {
                const res = await fetch('/api/total');
                if (res.status === 500) throw new Error('500');
                if (!res.ok) return;
                const data = await res.json();
                const container = document.getElementById('processing');
                const processContainer = document.getElementById('process-container');
                if (!data.sessions || data.sessions.length === 0) {
                    processContainer.style.display = 'none';
                    return;
                }
                processContainer.style.display = 'block';
                container.innerHTML = '';
                let totalShares=0, active=0, completed=0;
                data.sessions.forEach(s => {
                    totalShares += s.sharedCount;
                    if(s.status === 'running') active++;
                    if(s.status === 'completed') completed++;
                    const percent = (s.sharedCount / s.targetAmount)*100;
                    const card = document.createElement('div');
                    card.className = 'process-card';
                    card.innerHTML = `
                        <div><div class="process-url"><i class="fas fa-link"></i> ${s.url.substring(0,60)}${s.url.length>60?'...':''}</div>
                        <div style="display:flex; gap:10px; margin-top:8px;"><div style="flex:1; height:6px; background:rgba(255,255,255,0.2); border-radius:3px;"><div style="width:${percent}%; height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:3px;"></div></div><span style="color:#fff; font-size:12px;">${percent.toFixed(0)}%</span></div></div>
                        <div style="display:flex; gap:12px;"><span class="stat-badge">${s.sharedCount}/${s.targetAmount}</span>
                        <span class="status-badge" style="background:${s.status==='running'?'rgba(33,150,243,0.3)':'rgba(76,175,80,0.3)'}">${s.status.toUpperCase()}</span></div>
                    `;
                    container.appendChild(card);
                });
                document.getElementById('total-shares').innerText = totalShares;
                document.getElementById('active-sessions').innerText = active;
                document.getElementById('completed-sessions').innerText = completed;
                document.getElementById('session-count').innerText = data.activeSessions;
            } catch(e) {
                if(e.message === '500') window.location.href = '/?error=500';
            }
        }
        
        function initApp() {
            if(refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(loadProcessing, 2000);
            loadProcessing();
            document.getElementById('github-link')?.addEventListener('click', (e) => { e.preventDefault(); window.open('https://github.com', '_blank'); });
            document.getElementById('amounts').value = '100';
            document.getElementById('intervals').value = '2';
        }
        
        window.submitForm = submitForm;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function showResultMsg(msg, type) {
        const resDiv = document.getElementById('result');
        if(resDiv) {
            resDiv.textContent = msg;
            resDiv.className = `result-message ${type}`;
            resDiv.style.display = 'block';
            setTimeout(() => { if(resDiv) resDiv.style.display = 'none'; }, 4000);
        }
    }
</script>
</body>
</html>
